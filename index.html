<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakpoint | Team Simulation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <header class="topbar">
      <div class="brand-lockup">
        <span class="brand-kicker">Organizational Behavior Simulation</span>
        <h1 class="brand-title">Breakpoint</h1>
      </div>

      <div class="topbar-actions">
        <button class="ghost-button" id="headerRolesButton" type="button">Team Roles</button>
        <button class="ghost-button" id="headerResetButton" type="button">Reset</button>
      </div>
    </header>

    <main id="app" class="screen-host" aria-live="polite"></main>

    <footer class="footer-note">Educational team-role simulation</footer>
  </div>

  <div id="modalRoot" class="modal-root hidden" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
